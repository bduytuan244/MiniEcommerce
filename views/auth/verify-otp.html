<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - Mini Ecommerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; margin: 0; }
        .auth-box { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; }
        .auth-box h2 { text-align: center; margin-top: 0; margin-bottom: 10px; color: #333; font-size: 1.8rem; }
        .text-muted { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.5; }
        
        .form-group { position: relative; margin-bottom: 20px; }
        .form-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .form-group input { width: 100%; padding: 14px 14px 14px 42px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
        .form-group input:focus { border-color: #28a745; outline: none; }
        
        .btn-submit { width: 100%; padding: 14px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 8px; font-size: 1rem; font-weight: 600; transition: 0.2s; }
        .btn-submit:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2><i class="fa-solid fa-shield-check" style="color: #28a745;"></i> Xác thực tài khoản</h2>
        <p class="text-muted">Mã xác thực 6 số đã được gửi đến email của bạn. Vui lòng kiểm tra hộp thư (hoặc mục Spam).</p>
        
        <form id="otp-form">
            <div class="form-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" readonly style="background: #f9f9f9; color: #888;">
            </div>
            <div class="form-group">
                <i class="fa-solid fa-key"></i>
                <input type="text" id="otp" placeholder="Nhập mã OTP 6 số" required maxlength="6" style="text-align: center; letter-spacing: 5px; font-weight: bold; font-size: 1.2rem;">
            </div>
            <button type="submit" class="btn-submit" id="btn-submit">Xác nhận Kích hoạt</button>
        </form>
    </div>

    <script>
        const savedEmail = localStorage.getItem('registerEmail');
        if(savedEmail) document.getElementById('email').value = savedEmail;

        document.getElementById('otp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;
            const btn = document.getElementById('btn-submit');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang kiểm tra...';
            btn.disabled = true;

            try {
                const res = await fetch('http://localhost:5000/api/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('refreshToken', data.refreshToken);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    Swal.fire({
                        title: 'Thành công!',
                        text: 'Tài khoản đã được kích hoạt.',
                        icon: 'success',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = '../home/index.html';
                    });
                } else {
                    Swal.fire('Thất bại', data.message, 'error');
                    btn.innerText = "Xác nhận Kích hoạt";
                    btn.disabled = false;
                }
            } catch (error) {
                Swal.fire('Lỗi', 'Lỗi kết nối Server', 'error');
                btn.innerText = "Xác nhận Kích hoạt";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
