<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Mini Ecommerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; margin: 0; }
        .auth-box { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; }
        .auth-box h2 { text-align: center; margin-top: 0; margin-bottom: 25px; color: #333; font-size: 1.8rem; }
        
        .form-group { position: relative; margin-bottom: 20px; }
        .form-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .form-group input { width: 100%; padding: 14px 14px 14px 42px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
        .form-group input:focus { border-color: #28a745; outline: none; }
        
        .btn-submit { width: 100%; padding: 14px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 8px; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .btn-submit:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>Tạo Mật Khẩu Mới</h2>
        <form id="reset-form">
            <div class="form-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Nhập mật khẩu mới" required minlength="6">
            </div>
            <div class="form-group">
                <i class="fa-solid fa-circle-check"></i>
                <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu mới" required>
            </div>
            <button type="submit" id="btn-submit">Cập nhật Mật khẩu</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            Swal.fire({
                title: 'Lỗi bảo mật',
                text: 'Đường dẫn không hợp lệ hoặc đã hết hạn!',
                icon: 'error',
                allowOutsideClick: false
            }).then(() => {
                window.location.href = 'login.html';
            });
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = document.getElementById('btn-submit');

            if (password !== confirmPassword) {
                Swal.fire('Thất bại', 'Hai mật khẩu không khớp nhau!', 'error');
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
            btn.disabled = true;

            try {
                const res = await fetch(`http://localhost:5000/api/auth/reset-password/${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (res.ok) {
                    Swal.fire({
                        title: 'Hoàn tất!',
                        text: 'Mật khẩu của bạn đã được thay đổi an toàn.',
                        icon: 'success',
                        allowOutsideClick: false
                    }).then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    Swal.fire('Lỗi', data.message, 'error');
                    btn.innerText = "Cập nhật Mật khẩu";
                    btn.disabled = false;
                }
            } catch (error) {
                Swal.fire('Lỗi', 'Lỗi kết nối Server!', 'error');
                btn.innerText = "Cập nhật Mật khẩu";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
