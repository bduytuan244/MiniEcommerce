<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Mini Ecommerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; margin: 0; }
        .auth-box { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; }
        .auth-box h2 { text-align: center; margin-top: 0; margin-bottom: 10px; color: #333; font-size: 1.8rem; }
        .text-muted { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.5; }
        
        .form-group { position: relative; margin-bottom: 20px; }
        .form-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .form-group input { width: 100%; padding: 14px 14px 14px 42px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
        .form-group input:focus { border-color: #ffc107; outline: none; }
        
        .btn-submit { width: 100%; padding: 14px; background: #ffc107; color: #333; border: none; cursor: pointer; border-radius: 8px; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .btn-submit:hover { background: #e0a800; }
        
        .back-link { text-align: center; margin-top: 20px; display: block; color: #555; text-decoration: none; font-size: 0.95rem; }
        .back-link:hover { color: #333; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>Quên Mật Khẩu?</h2>
        <p class="text-muted">Vui lòng nhập email đăng nhập của bạn, chúng tôi sẽ gửi liên kết khôi phục mật khẩu an toàn.</p>
        
        <form id="forgot-form">
            <div class="form-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Nhập địa chỉ email..." required>
            </div>
            <button type="submit" id="btn-submit">Gửi yêu cầu khôi phục</button>
        </form>

        <a href="login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại Đăng nhập</a>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('btn-submit');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang gửi...';
            btn.disabled = true;

            try {
                const res = await fetch('http://localhost:5000/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (res.ok) {
                    Swal.fire('Đã gửi thành công!', 'Vui lòng kiểm tra hộp thư (cả mục Spam) để lấy link đổi mật khẩu.', 'success');
                } else {
                    Swal.fire('Lỗi', data.message, 'error');
                }
            } catch (error) {
                Swal.fire('Lỗi', 'Lỗi kết nối Server!', 'error');
            } finally {
                btn.innerText = "Gửi yêu cầu khôi phục";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
