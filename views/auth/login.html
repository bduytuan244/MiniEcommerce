<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Mini Ecommerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; margin: 0; }
        .auth-box { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; }
        .auth-box h2 { text-align: center; margin-top: 0; margin-bottom: 25px; color: #333; font-size: 1.8rem; }
        
        .form-group { position: relative; margin-bottom: 20px; }
        .form-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .form-group input { width: 100%; padding: 14px 14px 14px 42px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 0.95rem; transition: 0.2s; }
        .form-group input:focus { border-color: #ee4d2d; outline: none; box-shadow: 0 0 0 3px rgba(238,77,45,0.1); }
        
        .btn-submit { width: 100%; padding: 14px; background: #ee4d2d; color: white; border: none; cursor: pointer; border-radius: 8px; font-size: 1rem; font-weight: 600; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-submit:hover { background: #d73a1c; }
        
        .links { text-align: center; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .links a { text-decoration: none; color: #0056b3; font-size: 0.95rem; transition: 0.2s; }
        .links a:hover { color: #ee4d2d; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>Đăng Nhập</h2>
        <form id="login-form">
            <div class="form-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="form-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="btn-submit" id="btn-submit">
                <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
            </button>
        </form>
        <div class="links">
            <a href="forgot-password.html">Quên mật khẩu?</a>
            <a href="register.html">Chưa có tài khoản? <strong>Đăng ký ngay</strong></a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
            btn.disabled = true;

            try {
                const res = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('refreshToken', data.refreshToken);
                    localStorage.setItem('user', JSON.stringify(data.user)); 

                    if (data.user.isAdmin) {
                        localStorage.setItem('adminToken', data.accessToken);
                        localStorage.setItem('adminUser', JSON.stringify(data.user));
                        window.location.href = '../admin/index.html'; 
                    } 
                    else if (data.user.isSeller) {
                        window.location.href = '../home/index.html';
                    } 
                    else {
                        window.location.href = '../home/index.html';
                    }
                } else {
                    Swal.fire('Lỗi đăng nhập', data.message, 'error');
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Đăng nhập';
                    btn.disabled = false;
                }
            } catch (error) {
                Swal.fire('Lỗi', 'Không thể kết nối đến máy chủ!', 'error');
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Đăng nhập';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
