<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Mini Ecommerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <a href="../seller/index.html" id="link-seller-center">
        <i class="fa-solid fa-store"></i> Kênh Người Bán
    </a>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f5; margin: 0; }

        .breadcrumb { max-width: 1000px; margin: 20px auto; padding: 0 20px; color: #555; font-size: 0.9rem; }
        .breadcrumb a { color: #0056b3; text-decoration: none; }
        
        .detail-container {
            display: flex; gap: 40px; padding: 30px;
            max-width: 1000px; margin: 0 auto 30px;
            background: white; border-radius: 12px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }
        .left-column { flex: 4; }
        .left-column img { width: 100%; border-radius: 8px; border: 1px solid #f0f0f0; object-fit: contain; }
        
        .right-column { flex: 5; display: flex; flex-direction: column; }
        .product-title { font-size: 1.8rem; color: #333; margin: 0 0 15px; font-weight: 600; line-height: 1.3; }
        .product-meta { color: #666; font-size: 0.9rem; margin-bottom: 20px; display: flex; gap: 15px; }
        
        .price-box { background: #fafafa; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; }
        .product-price { color: #ee4d2d; font-size: 2.2rem; font-weight: 700; margin: 0; }
        
        .action-box { display: flex; gap: 15px; margin-top: auto; padding-top: 20px; border-top: 1px solid #eee; }
        .btn-buy {
            background: #ee4d2d; color: white; padding: 15px 30px; font-size: 1.1rem;
            border: none; border-radius: 6px; cursor: pointer; font-weight: 600; flex: 1; transition: 0.2s;
        }
        .btn-buy:hover { background: #d73a1c; }
        
        .review-section {
            max-width: 1000px; margin: 0 auto 50px; padding: 30px;
            background: white; border-radius: 12px; box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }
        .review-section h2 { margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; font-size: 1.4rem; }
        .review-form { margin-bottom: 30px; background: #fafafa; padding: 20px; border-radius: 8px; }
        .review-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Inter', sans-serif; box-sizing: border-box; }
        .btn-submit-review { background: #28a745; color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        .star-color { color: #ffce3d; }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="breadcrumb">
        <a href="index.html">Trang chủ</a> <i class="fa-solid fa-angle-right" style="font-size: 0.8em; margin: 0 5px;"></i> Chi tiết sản phẩm
    </div>

    <div id="detail-content" class="detail-container">
        <p style="text-align: center; width: 100%; color: #666;"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải thông tin sản phẩm...</p>
    </div>

    <div id="review-section" class="review-section">
        <h2>Khách hàng đánh giá</h2>
        
        <div class="review-form">
            <h3 style="margin-top: 0; font-size: 1.1rem;">Viết đánh giá của bạn</h3>
            <form id="form-review">
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: 600; display: block; margin-bottom: 8px;">Mức độ hài lòng:</label>
                    <select id="rating" class="review-input" style="width: auto;">
                        <option value="5">5 Sao - Tuyệt vời</option>
                        <option value="4">4 Sao - Rất tốt</option>
                        <option value="3">3 Sao - Bình thường</option>
                        <option value="2">2 Sao - Tệ</option>
                        <option value="1">1 Sao - Rất tệ</option>
                    </select>
                </div>
                <div>
                    <label style="font-weight: 600; display: block; margin-bottom: 8px;">Cảm nhận chi tiết:</label>
                    <textarea id="comment" rows="4" class="review-input" placeholder="Bạn thấy sản phẩm này thế nào? (Chất lượng, màu sắc, đóng gói...)" required></textarea>
                </div>
                <button type="submit" class="btn-submit-review">
                    <i class="fa-solid fa-paper-plane"></i> Gửi đánh giá
                </button>
            </form>
        </div>

        <div id="review-list">
            <p style="text-align: center; color: #666;">Chưa có đánh giá nào cho sản phẩm này.</p>
        </div>
    </div>

    <div id="footer"></div>

    <script src="../utils.js"></script>
    <script src="product-detail.js"></script>
</body>
</html>
